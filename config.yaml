training:
  gamma: 0.99                  # discount factor
  grad_clip: 10.0              # max gradient L2 norm
  batch_size: 128              # best từ search
  learning_rate: 3.0e-4        # best từ narrow search round 3 (trial_010, MeanEval=2920)
  replay_capacity: 200000      # tăng cho train dài 20k ep
  learn_start: 1000            # bắt đầu train khi buffer có ít nhất n transition
  learn_every: 4               # update mỗi n bước
  target_sync_every: 1000      # tăng lên cho ổn định khi train dài
  num_episodes: 20000          # train thật (override bằng --episodes)
  max_steps_per_episode: 10000 # giới hạn bước mỗi episode
  use_double_dqn: true         # Double DQN + N-step
  n_steps: 3                   # best từ search
  loss: "huber"                # mse | huber | smooth_l1
  save_every: 500              # lưu checkpoint mỗi n episode
  eval_games: 5                # trung bình 5 game — giảm noise eval
  eval_every: 100              # eval mỗi 100 ep
  lr_decay_every: 3000         # decay LR mỗi n episode
  lr_decay_factor: 0.5         # 3e-4 → 1.5e-4 (ep3000) → 7.5e-5 (ep6000) → ...
  lr_min: 1.0e-5               # sàn LR — không để giảm dưới mức này

epsilon:
  start: 1.0                   # epsilon ban đầu (100% random)
  end: 0.05                    # epsilon tối thiểu
  decay_steps: 500000          # scale từ 50k (1500ep) → 500k (20k ep) theo tỉ lệ

network:
  type: "dueling"              # vanilla | deep | dueling (CNN 18-channel)
  hidden_dim: 256

env:
  seed: 42

reward_shaping:
  enabled: false             # bật để thêm bonus empty/corner/monotonicity
  empty_cells_weight: 10.0   # +10 mỗi ô trống
  corner_weight: 50.0        # +50*log2(max_tile) khi max tile ở góc
  monotonicity_weight: 5.0   # +5 * monotonicity score

per:
  enabled: false             # Prioritized Experience Replay
  alpha: 0.6                 # mức ưu tiên (0=uniform, 1=full TD-error priority)
  beta_start: 0.4            # IS correction ban đầu
  beta_end: 1.0              # IS correction cuối (anneal về 1.0)
  eps: 1.0e-6                # tránh priority = 0

guide:
  enabled: true
  depth: 1               # 1=nhanh (~120 node/move) | 2=tốt hơn (~4000 node/move)
  decay_steps: 300000    # guide fades sau 300k steps (~600 ep) — tăng từ 30k
  min_prob: 0.0          # tắt hoàn toàn sau decay
