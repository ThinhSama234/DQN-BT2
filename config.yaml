training:
  gamma: 0.99                  # discount factor
  grad_clip: 10.0              # max gradient L2 norm
  batch_size: 128              # tốt nhất từ search
  learning_rate: 5.0e-4        # tốt nhất từ narrow search (trial_001, eval=3328)
  replay_capacity: 100000      # số transition tối đa trong ReplayBuffer
  learn_start: 1000            # bắt đầu train khi buffer có ít nhất n transition
  learn_every: 4               # update mỗi n bước
  target_sync_every: 500       # số bước giữa mỗi lần sync target_net
  num_episodes: 3000           # tổng số episode train (override bằng --episodes)
  max_steps_per_episode: 10000 # giới hạn bước mỗi episode
  use_double_dqn: true         # Double DQN + N-step
  n_steps: 3                   # N-step return
  loss: "huber"                # mse | huber | smooth_l1

epsilon:
  start: 1.0                   # epsilon ban đầu (100% random)
  end: 0.05                    # epsilon tối thiểu
  decay_steps: 150000          # scale cho 3000 ep (~50 steps/ep × 3000 = 150k)

network:
  type: "dueling"              # vanilla | deep | dueling (CNN 18-channel)
  hidden_dim: 256

env:
  seed: 42

guide:
  enabled: true
  depth: 1               # 1=nhanh (~120 node/move) | 2=tốt hơn (~4000 node/move)
  decay_steps: 30000     # guide fades sau 30k steps (~600 ep đầu)
  min_prob: 0.0          # tắt hoàn toàn sau decay
